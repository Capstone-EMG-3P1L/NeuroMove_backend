version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: neuromove-mysql-local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: ${DB_NAME:-emg_db}
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-1234}
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_local:/var/lib/mysql

  redis:
    image: redis:7
    container_name: neuromove-redis-local
    restart: always
    ports:
      - "6380:6379"

volumes:
  mysql_data_local: