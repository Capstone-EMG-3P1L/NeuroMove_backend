spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3307/emg_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

security:
  api-key: my-secret-key

jwt:
  secret: local-dev-secret-key-minimum-32-characters-long
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

ai:
  server:
    url: http://localhost:8000
